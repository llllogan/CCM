listen: ":8080"
auth_token: "replace-with-long-random-token"
inventory_ttl_seconds: 3
restart_state_file: /tmp/ccm-restart-state.json

# Optional exact notify-service endpoint:
# notification_service_url: "http://notify:8081/notify/household"
# notification_service_key: "same-value-as-notify-api_key"

notifications:
  clive:
    enabled: false
    webhook_url: "http://clive.local:3456/webhooks/inbound"
    token: "replace-with-clive-inbound-webhook-token"
    user_number: "+15555555555"
    min_severity: warning
    cooldown: 15m
    include_logs_tail: 80

restart_strategies:
  nightly_4am_local:
    cron: "0 4 * * *"
  sunday_430_local:
    cron: "30 4 * * 0"
  monthly_1st_345_utc:
    cron: "45 3 1 * *"
    timezone: UTC

targets:
  self:
    host: 10.10.10.21
    port: 22
    user: logan
    deploy_root: /home/logan
    # Filesystem, mount path, or device passed to `df -h` for stack disk usage.
    disk_path: /
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"
  sabnzbd:
    host: 10.10.10.18
    port: 22
    user: logan
    deploy_root: /home/logan
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"
  jellyfin:
    host: 10.10.10.11
    port: 22
    user: logan
    deploy_root: /home/logan
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"
  pickeragent:
    host: 10.10.20.9
    port: 22
    user: logan
    deploy_root: /home/deploy
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"
  arrbox:
    host: 10.10.10.17
    port: 22
    user: logan
    deploy_root: /home/logan
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"
  navidrome:
    host: 10.10.10.12
    port: 22
    user: logan
    deploy_root: /home/logan
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"

stacks:
  ccm:
    target: self
    deploy_subdir: ccm
    restart:
      strategy: sunday_430_local
      containers:
        ccm:
          strategy: none
  sabnzbd:
    target: sabnzbd
    deploy_subdir: sabnzbd
    restart:
      strategy: nightly_4am_local
  jellyfin:
    target: jellyfin
    deploy_subdir: jellyfin
    restart:
      strategy: sunday_430_local
      containers:
        jellyfin:
          strategy: nightly_4am_local
    scripts:
      - name: cleanup-cache-nightly
        cron: "0 3 * * *"
        file: clean-jellyfin-cache.sh
        timezone: Australia/Brisbane
  pickeragent:
    target: pickeragent
    deploy_subdir: pickeragent
  arrbox:
    target: arrbox
    deploy_subdir: arrbox
    restart:
      strategy: nightly_4am_local
      containers:
        caddy:
          strategy: none
        sonarr:
          strategy: monthly_1st_345_utc
    scripts:
      - name: backup-metadata
        cron: "15 2 * * *"
        file: backup-metadata.sh
      - name: weekly-maintenance
        cron: "0 5 * * 0"
        file: weekly-maintenance.sh
  navidrome:
    target: navidrome
    deploy_subdir: navidrome
  # Optional notify service stack. The target host must contain notify_service/config.yml.
  notify:
    target: self
    deploy_subdir: notify
