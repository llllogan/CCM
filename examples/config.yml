listen: ":8080"
auth_token: "replace-with-long-random-token"
inventory_ttl_seconds: 3
restart_state_file: /tmp/ccm-restart-state.json

restart_strategies:
  nightly_4am_local:
    cron: "0 4 * * *"
  sunday_430_local:
    cron: "30 4 * * 0"
  monthly_1st_345_utc:
    cron: "45 3 1 * *"
    timezone: UTC

targets:
  self:
    host: 10.10.10.21
    port: 22
    user: logan
    deploy_root: /home/logan
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"
  sabnzbd:
    host: 10.10.10.18
    port: 22
    user: logan
    deploy_root: /home/logan
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"
  jellyfin:
    host: 10.10.10.11
    port: 22
    user: logan
    deploy_root: /home/logan
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"
  pickeragent:
    host: 10.10.20.9
    port: 22
    user: logan
    deploy_root: /home/deploy
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"
  arrbox:
    host: 10.10.10.17
    port: 22
    user: logan
    deploy_root: /home/logan
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"
  navidrome:
    host: 10.10.10.12
    port: 22
    user: logan
    deploy_root: /home/logan
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"

stacks:
  ccm:
    target: self
    deploy_subdir: ccm
    restart:
      strategy: sunday_430_local
      containers:
        ccm:
          strategy: none
  sabnzbd:
    target: sabnzbd
    deploy_subdir: sabnzbd
    restart:
      strategy: nightly_4am_local
  jellyfin:
    target: jellyfin
    deploy_subdir: jellyfin
    restart:
      strategy: sunday_430_local
      containers:
        jellyfin:
          strategy: nightly_4am_local
  pickeragent:
    target: pickeragent
    deploy_subdir: pickeragent
  arrbox:
    target: arrbox
    deploy_subdir: arrbox
    restart:
      strategy: nightly_4am_local
      containers:
        caddy:
          strategy: none
        sonarr:
          strategy: monthly_1st_345_utc
  navidrome:
    target: navidrome
    deploy_subdir: navidrome
