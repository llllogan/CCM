listen: ":8080"
auth_token: "replace-with-long-random-token"
inventory_ttl_seconds: 3

targets:
  vm-prod:
    host: 192.168.1.50
    port: 22
    user: deploy
    deploy_root: /opt
    defaults:
      pull: true
      remove_orphans: true
      recreate: "default"
    profiles:
      fast:
        pull: false
      force:
        recreate: "force"

stacks:
  ccm:
    target: vm-prod
    deploy_subdir: ccm
  repo-a__service1:
    target: vm-prod
    deploy_subdir: repo-a/service1
