name: Deploy via CCM API

on:
  workflow_run:
    workflows: ["CI, build, publish"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' }}
    runs-on: [self-hosted, linux]
    env:
      CCM_URL: ${{ vars.CCM_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate deployment inputs
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${CCM_URL}" ] || { echo "CCM_URL secret is required"; exit 1; }
          [ -n "${CLOUDFLARE_API_TOKEN}" ] || { echo "CLOUDFLARE_API_TOKEN secret is required"; exit 1; }
          [ -f docker-compose.yml ] || { echo "docker-compose.yml not found"; exit 1; }
          [ -f caddy/Caddyfile.example ] || { echo "caddy/Caddyfile.example not found"; exit 1; }

      - name: Deploy compose, caddyfile, and env via CCM
        shell: bash
        run: |
          set -euo pipefail

          env_file_content=$'CLOUDFLARE_API_TOKEN='"${CLOUDFLARE_API_TOKEN}"$'\n'

          jq -cn \
            --arg ccm_stack "ccm" \
            --arg repo "${GITHUB_REPOSITORY}" \
            --arg sha "${SOURCE_SHA}" \
            --rawfile compose_yml docker-compose.yml \
            --rawfile caddyfile caddy/Caddyfile.example \
            --arg env_file "${env_file_content}" \
            --argjson run_compose false \
            '{
              ccm_stack: $ccm_stack,
              repo: $repo,
              sha: $sha,
              compose_yml: $compose_yml,
              caddyfile: $caddyfile,
              env_file: $env_file,
              run_compose: $run_compose
            }' > deploy-payload.json

          deploy_code="$(
            curl -sS -o deploy-response.json -w '%{http_code}' \
              -X POST "${CCM_URL}/v1/deploy" \
              -H "Content-Type: application/json" \
              --data @deploy-payload.json
          )"
          if [ "${deploy_code}" -lt 200 ] || [ "${deploy_code}" -ge 300 ]; then
            echo "Deploy failed with HTTP ${deploy_code}"
            cat deploy-response.json
            exit 1
          fi
          cat deploy-response.json

      - name: Trigger CCM special self-redeploy
        shell: bash
        run: |
          set -euo pipefail

          redeploy_code="$(
            curl -sS -o redeploy-response.json -w '%{http_code}' \
              -X POST "${CCM_URL}/v1/compose/ccm/redeploy" \
              -H "Content-Type: application/json"
          )"
          if [ "${redeploy_code}" -lt 200 ] || [ "${redeploy_code}" -ge 300 ]; then
            echo "Self-redeploy failed with HTTP ${redeploy_code}"
            cat redeploy-response.json
            exit 1
          fi
          cat redeploy-response.json

      - name: Wait 60 seconds after self-redeploy
        shell: bash
        run: |
          set -euo pipefail

          sleep 60

      - name: Restart CCM stack containers after self-redeploy
        shell: bash
        run: |
          set -euo pipefail

          children_endpoint="${CCM_URL%/}/v1/items/ccm/children"
          found_ids=""
          for _ in 1 2 3 4 5; do
            code="$(
              curl -sS -o ccm-children-response.json -w '%{http_code}' \
                -H "Content-Type: application/json" \
                "${children_endpoint}"
            )"
            if [ "${code}" -ge 200 ] && [ "${code}" -lt 300 ]; then
              found_ids="$(jq -r '.[].id' ccm-children-response.json 2>/dev/null || true)"
              [ -n "${found_ids}" ] && break
            fi
            sleep 2
          done

          [ -n "${found_ids}" ] || { echo "No CCM containers found to restart"; exit 0; }

          failures=0
          while IFS= read -r cid; do
            [ -n "${cid}" ] || continue
            cid_uri="$(jq -rn --arg v "${cid}" '$v|@uri')"
            restart_code="$(
              curl -sS -o "restart-${cid_uri}.json" -w '%{http_code}' \
                -X POST \
                -H "Content-Type: application/json" \
                "${CCM_URL%/}/v1/containers/${cid_uri}/restart"
            )"
            if [ "${restart_code}" -lt 200 ] || [ "${restart_code}" -ge 300 ]; then
              echo "Restart failed for ${cid}: HTTP ${restart_code}"
              cat "restart-${cid_uri}.json"
              failures=$((failures + 1))
            fi
          done <<< "${found_ids}"

          [ "${failures}" -eq 0 ] || exit 1
