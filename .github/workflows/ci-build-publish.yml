name: CI, build, publish

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.23.x"
      - run: go mod tidy
      - run: go test ./...
      - run: go build ./...

  publish:
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: ghcr.io/llllogan/ccm
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Compute image coordinates
        id: vars
        run: |
          sha_short="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          echo "sha_short=${sha_short}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          SHA_SHORT: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker build \
            -t "${IMAGE_REPO}:${SHA_SHORT}" \
            -t "${IMAGE_REPO}:latest" \
            .
          docker push "${IMAGE_REPO}:${SHA_SHORT}"
          docker push "${IMAGE_REPO}:latest"
