name: Release And Self Deploy

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    env:
      REGISTRY: ghcr.io
      CCM_IMAGE_NAME: llllogan/ccm
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          echo "sha_short=$(echo $GITHUB_SHA | cut -c1-12)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          CCM_IMAGE="${REGISTRY}/${CCM_IMAGE_NAME}"

          docker build -t "${CCM_IMAGE}:${{ steps.vars.outputs.sha_short }}" -t "${CCM_IMAGE}:latest" .
          docker push "${CCM_IMAGE}:${{ steps.vars.outputs.sha_short }}"
          docker push "${CCM_IMAGE}:latest"

  deploy:
    runs-on: [self-hosted, linux]
    needs: build-push
    env:
      REGISTRY: ghcr.io
      CCM_IMAGE_NAME: llllogan/ccm
    steps:
      - uses: actions/checkout@v4

      - name: Render compose
        run: |
          CCM_IMAGE="${REGISTRY}/${CCM_IMAGE_NAME}:${{ needs.build-push.outputs.sha_short }}"
          cat > docker-compose.rendered.yml <<EOF2
          services:
            ccm:
              image: ${CCM_IMAGE}
              container_name: ccm
              restart: unless-stopped
              volumes:
                - /etc/ccm:/etc/ccm:ro
                - /home/logan/.ssh:/home/logan/.ssh:ro
              environment:
                - CCM_SSH_KEY=/home/logan/.ssh/id_ed25519

            caddy:
              image: ghcr.io/caddybuilds/caddy-cloudflare:latest
              container_name: ccm-caddy
              restart: unless-stopped
              depends_on:
                - ccm
              ports:
                - "80:80"
                - "443:443"
              environment:
                - CLOUDFLARE_API_TOKEN=\${CLOUDFLARE_API_TOKEN}
                - ACME_EMAIL=\${ACME_EMAIL}
              volumes:
                - ./Caddyfile:/etc/caddy/Caddyfile:ro
                - caddy_data:/data
                - caddy_config:/config

          volumes:
            caddy_data:
            caddy_config:
          EOF2

          cat > Caddyfile.rendered <<EOF2
          {
            email {\$ACME_EMAIL}
          }

          ccm.janssen.host {
            tls {
              dns cloudflare {env.CLOUDFLARE_API_TOKEN}
            }
            encode zstd gzip
            reverse_proxy ccm:8080
          }
          EOF2

      - name: Deploy via CCM API
        env:
          CCM_URL: ${{ secrets.CCM_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
        run: |
          jq -n \
            --arg stack "ccm" \
            --arg repo "${GITHUB_REPOSITORY}" \
            --arg sha "${GITHUB_SHA}" \
            --arg compose "$(cat docker-compose.rendered.yml)" \
            --arg caddyfile "$(cat Caddyfile.rendered)" \
            --arg cf_token "${CLOUDFLARE_API_TOKEN}" \
            --arg acme_email "${ACME_EMAIL}" \
            '{ccm_stack:$stack, repo:$repo, sha:$sha, compose_yml:$compose, caddyfile:$caddyfile, env:{CLOUDFLARE_API_TOKEN:$cf_token, ACME_EMAIL:$acme_email}}' > payload.json

          curl -fsSL -X POST "${CCM_URL}/v1/deploy" \
            -H "Content-Type: application/json" \
            --data @payload.json
